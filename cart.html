<!--------------Cart Items details--------------->
<div class="small-container cart-page">
   
   <table>

           <th>Product</th>

       <tr>
           <td>

           </td>
           <td><input type="number" value="1"></td>
           <td>$5</td>
       </tr>
       <tr>
           <td>
               <div class="cart-info">
                   <img src="https://img.choice.com.au/-/media/f007385452de4639acc4c62d94100fb6.ashx?w=660&jq=80%20660w">

                       <p>Chocolates</p>

           </td>
           <td><input type="number" value="1"></td>
           <td>$0.50</td>
       </tr>
       <tr>
           <td>
               <div class="cart-info">
                   <img src="images/sherbet.png">

                       <p>Mini Sherbet</p>

           </td>

   </table>
    
    <div class="total-price">
        <table>
            <tr>
                <td>Subtotal</td>

            </tr>
            <tr>
                <td>Tax</td>
                <td>$35.00</td>
            </tr>
            <tr>
                <td>Total</td>
                <td>$235.00</td>
            </tr>
            
        </table>

    <div class="total-price">

<!-------------js for toggle menu-------------->

<script>
    
    var MenuItems = document.getElementById("MenuItems");
    
    MenuItems.style.maxHeight = "0px";
    
    function menutoggle()
    {
        if(MenuItems.style.maxHeight == "0px")
            {
                MenuItems.style.maxHeight = "200px";
            }else
            {
                MenuItems.style.maxHeight = "0px"
            } 
    }
    
    
</script>



</body>
